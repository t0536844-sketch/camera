<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📸 Camera Stream</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📸</text></svg>">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f0f1a;
            color: #e8e8f0;
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            background: rgba(30, 30, 50, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 30px;
            max-width: 400px;
            width: 100%;
            text-align: center;
        }
        h1 { font-size: 1.5rem; margin-bottom: 8px; }
        .subtitle { color: #8888aa; font-size: 0.9rem; margin-bottom: 24px; }
        .btn {
            display: block;
            width: 100%;
            padding: 14px;
            margin: 10px 0;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            text-align: center;
            transition: all 0.2s;
        }
        .btn:active { transform: scale(0.97); }
        .btn-primary {
            background: linear-gradient(135deg, #6c5ce7, #a29bfe);
            color: white;
        }
        .btn-secondary {
            background: rgba(255,255,255,0.1);
            color: #e8e8f0;
            border: 1px solid rgba(255,255,255,0.1);
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>📸 Camera Stream v4</h1>
        <p class="subtitle">Multi-camera live monitoring with room codes</p>
        <a href="/index.html" class="btn btn-primary">📷 Camera Device</a>
        <a href="/viewer.html" class="btn btn-secondary">🎬 Admin Monitor</a>
        <p style="margin-top:16px;font-size:0.8rem;color:#8888aa;">
            Device buka kamera → pilih/generate room code → broadcast.<br>
            Admin buka dashboard → join room → lihat stream.
        </p>
    </div>
</body>
</html>
