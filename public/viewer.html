<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🎬 Admin — Camera Monitor</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎬</text></svg>">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="header-content">
            <h1>🎬 Admin Monitor</h1>
            <div class="connection-status" id="connectionStatus">
                <span class="status-dot"></span>
                <span class="status-text">Connecting...</span>
            </div>
        </div>
    </header>

    <main class="container">
        <!-- Join Room -->
        <section id="joinRoomSection" class="card">
            <h2>🔗 Join Room</h2>
            <div class="form-group">
                <label for="roomCode">Kode Room</label>
                <input type="text" id="roomCode" placeholder="Masukkan kode room..." maxlength="6" style="text-transform: uppercase;">
            </div>
            <button class="btn btn-primary btn-full" id="joinRoomBtn">📹 Join Room</button>
        </section>

        <!-- Room List (all available rooms) -->
        <section id="roomListSection" class="card">
            <h2>📡 Room Tersedia</h2>
            <div id="roomList" class="room-list">
                <div class="room-empty">
                    <p>Belum ada room aktif</p>
                </div>
            </div>
        </section>

        <!-- Multi-Stream Grid -->
        <section id="streamsSection" class="card hidden">
            <div class="streams-header">
                <h2>📹 Live Streams</h2>
                <span id="streamCount" class="stream-count-badge">0 streams</span>
            </div>
            <div id="streamsGrid" class="streams-grid">
                <!-- Dynamic stream cards go here -->
            </div>
        </section>

        <!-- Screenshots from client -->
        <section id="screenshotsSection" class="card hidden">
            <h2>📸 Screenshots</h2>
            <div id="screenshots" class="gallery-grid"></div>
        </section>

        <!-- Chat Panel -->
        <section id="chatSection" class="card hidden">
            <h2>💬 Chat</h2>
            <div id="chatMessages" class="chat-messages">
                <div class="chat-empty">Belum ada pesan</div>
            </div>
            <div class="chat-input-area">
                <input type="text" id="chatInput" placeholder="Ketik pesan..." maxlength="500">
                <button class="btn btn-primary" id="chatSendBtn">Kirim</button>
            </div>
        </section>
    </main>

    <!-- Fullscreen image modal -->
    <div id="imageModal" class="modal hidden">
        <div class="modal-content">
            <span class="modal-close" id="modalClose">&times;</span>
            <img id="fullImage" src="" alt="Full size">
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="viewer.js"></script>
</body>
</html>
