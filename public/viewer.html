<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>👁️ Viewer - Camera Stream</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>👁️</text></svg>">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="header">
        <div class="header-content">
            <h1>👁️ Viewer</h1>
            <div class="connection-status" id="connectionStatus">
                <span class="status-dot"></span>
                <span class="status-text">Connecting...</span>
            </div>
        </div>
    </header>

    <main class="container">
        <!-- Join Room -->
        <section id="joinSetup" class="card">
            <h2>🔗 Join Room</h2>
            <div class="form-group">
                <label for="roomCode">Kode Room</label>
                <input type="text" id="roomCode" placeholder="Masukkan kode room..." maxlength="6" style="text-transform: uppercase;">
            </div>
            <button class="btn btn-primary btn-full" id="joinRoom">👁️ Lihat Stream</button>
        </section>

        <!-- Stream View -->
        <section id="streamSection" class="card hidden">
            <div class="video-wrapper">
                <video id="streamVideo" autoplay playsinline></video>
                <div id="streamStatus" class="stream-status">
                    <span class="live-dot"></span>
                    <span id="streamText">Menunggu stream...</span>
                </div>
            </div>

            <div class="controls">
                <button class="ctrl-btn" id="remoteCapture" title="Request Foto">📷 Request Foto</button>
                <button class="ctrl-btn" id="remoteRecord" title="Request Rekam">⏺️ Request Rekam</button>
            </div>

            <div id="deviceInfo" class="device-info hidden"></div>
        </section>

        <!-- Screenshots from broadcaster -->
        <section id="screenshotsSection" class="card hidden">
            <h2>📸 Screenshots dari Broadcaster</h2>
            <div id="screenshots" class="gallery-grid"></div>
        </section>
    </main>

    <!-- Fullscreen image modal -->
    <div id="imageModal" class="modal hidden">
        <div class="modal-content">
            <span class="modal-close" id="modalClose">&times;</span>
            <img id="fullImage" src="" alt="Full size">
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="viewer.js"></script>
</body>
</html>
